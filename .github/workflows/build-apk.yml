name: Build Night Master APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  LLAMA_CPP_COMMIT: 8ee54c8b32a1b0cf13c03fc5723142bc62c775f6

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout prototype
        uses: actions/checkout@v4

      - name: Prepare project from pinned llama.cpp
        id: prepare_project
        shell: bash
        run: |
          set +e
          bash scripts/prepare_project.sh 2>&1 | tee "$GITHUB_WORKSPACE/prepare-project.log"
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload preparation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-prepare-log
          path: prepare-project.log
          if-no-files-found: error

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install native tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.13113456" \
            "cmake;3.31.6"

      - name: Build debug APK
        id: gradle_build
        working-directory: build/llama.cpp/examples/llama.android
        shell: bash
        run: |
          set +e
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-gradle-log
          path: gradle-build.log
          if-no-files-found: error

      - name: Collect APK and build metadata
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          apk_source="build/llama.cpp/examples/llama.android/app/build/outputs/apk/debug/app-debug.apk"
          apk_target="dist/NightMaster-prototype-debug.apk"
          cp "$apk_source" "$apk_target"
          sha256sum "$apk_target" > dist/SHA256.txt

          app_commit="$(git rev-parse HEAD)"
          llama_commit="$(git -C build/llama.cpp rev-parse HEAD)"
          apk_sha256="$(sha256sum "$apk_target" | cut -d' ' -f1)"

          cat > dist/BUILD_INFO.txt <<EOF
          NightMaster version: 0.5-prototype
          Package: ru.aspid.nightmaster
          Application commit: $app_commit
          llama.cpp commit: $llama_commit
          ABI: arm64-v8a
          Build type: debug
          APK SHA-256: $apk_sha256
          EOF

      - name: Validate APK contract
        shell: bash
        run: |
          set -euo pipefail
          apk="dist/NightMaster-prototype-debug.apk"

          package_name="$(apkanalyzer manifest application-id "$apk")"
          version_name="$(apkanalyzer manifest version-name "$apk")"
          version_code="$(apkanalyzer manifest version-code "$apk")"
          permissions="$(apkanalyzer manifest permissions "$apk")"
          files="$(apkanalyzer files list "$apk")"

          [[ "$package_name" == "ru.aspid.nightmaster" ]]
          [[ "$version_name" == "0.5-prototype" ]]
          [[ "$version_code" == "5" ]]

          if grep -Fq "android.permission.INTERNET" <<<"$permissions"; then
            echo "INTERNET permission must not be present" >&2
            exit 1
          fi

          grep -Eq '^/?lib/arm64-v8a/' <<<"$files"
          if grep -Eq '^/?lib/(x86|x86_64|armeabi-v7a)/' <<<"$files"; then
            echo "Unexpected non-ARM64 native library found" >&2
            exit 1
          fi

          actual_llama_commit="$(git -C build/llama.cpp rev-parse HEAD)"
          [[ "$actual_llama_commit" == "$LLAMA_CPP_COMMIT" ]]

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-prototype-apk
          path: dist/
          if-no-files-found: error
