name: Build Night Master APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  LLAMA_CPP_COMMIT: 8ee54c8b32a1b0cf13c03fc5723142bc62c775f6
  NIGHTMASTER_VERSION_NAME: 0.7-model-manager
  NIGHTMASTER_VERSION_CODE: 7

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout prototype
        uses: actions/checkout@v4

      - name: Prepare project from pinned llama.cpp
        id: prepare_project
        shell: bash
        run: |
          set +e
          bash scripts/prepare_project.sh 2>&1 | tee "$GITHUB_WORKSPACE/prepare-project.log"
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload preparation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-prepare-log
          path: prepare-project.log
          if-no-files-found: error

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install native tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.13113456" \
            "cmake;3.31.6"

      - name: Test and build debug APK
        id: gradle_build
        working-directory: build/llama.cpp/examples/llama.android
        shell: bash
        run: |
          set +e
          ./gradlew :app:testDebugUnitTest :app:assembleDebug --stacktrace 2>&1 | tee "$GITHUB_WORKSPACE/gradle-build.log"
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-gradle-log
          path: gradle-build.log
          if-no-files-found: error

      - name: Collect APK, Room schema and build metadata
        shell: bash
        env:
          NIGHTMASTER_SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          mkdir -p dist
          apk_source="build/llama.cpp/examples/llama.android/app/build/outputs/apk/debug/app-debug.apk"
          apk_target="dist/NightMaster-model-manager-debug.apk"
          schema_source="build/llama.cpp/examples/llama.android/app/schemas"

          cp "$apk_source" "$apk_target"
          (cd dist && sha256sum NightMaster-model-manager-debug.apk > SHA256.txt)

          if [[ ! -d "$schema_source" ]]; then
            echo "Room schema directory was not generated" >&2
            exit 1
          fi
          cp -R "$schema_source" dist/room-schemas

          checkout_commit="$(git rev-parse HEAD)"
          llama_commit="$(git -C build/llama.cpp rev-parse HEAD)"
          apk_sha256="$(sha256sum "$apk_target" | cut -d' ' -f1)"

          cat > dist/BUILD_INFO.txt <<EOF
          NightMaster version: $NIGHTMASTER_VERSION_NAME
          Version code: $NIGHTMASTER_VERSION_CODE
          Package: ru.aspid.nightmaster
          Application source commit: $NIGHTMASTER_SOURCE_COMMIT
          Workflow checkout commit: $checkout_commit
          llama.cpp commit: $llama_commit
          Inference ABI: arm64-v8a
          Build type: debug
          APK SHA-256: $apk_sha256
          EOF

      - name: Validate APK contract
        shell: bash
        run: |
          set -euo pipefail
          exec > >(tee "$GITHUB_WORKSPACE/apk-validation.log") 2>&1

          apk="dist/NightMaster-model-manager-debug.apk"
          committed_schema="overlay/app/schemas/ru.aspid.nightmaster.data.database.NightMasterDatabase/1.json"
          generated_schema="dist/room-schemas/ru.aspid.nightmaster.data.database.NightMasterDatabase/1.json"
          package_name="$(apkanalyzer manifest application-id "$apk")"
          version_name="$(apkanalyzer manifest version-name "$apk")"
          version_code="$(apkanalyzer manifest version-code "$apk")"
          permissions="$(apkanalyzer manifest permissions "$apk")"
          manifest="$(apkanalyzer manifest print "$apk")"
          files="$(unzip -Z1 "$apk")"
          actual_llama_commit="$(git -C build/llama.cpp rev-parse HEAD)"

          printf 'Package: %s\n' "$package_name"
          printf 'Version name: %s\n' "$version_name"
          printf 'Version code: %s\n' "$version_code"
          printf 'llama.cpp commit: %s\n' "$actual_llama_commit"
          printf 'Native libraries:\n'
          grep -E '^lib/' <<<"$files" || true
          printf 'Permissions:\n%s\n' "$permissions"

          [[ "$package_name" == "ru.aspid.nightmaster" ]] || {
            echo "Unexpected package name" >&2
            exit 1
          }
          [[ "$version_name" == "$NIGHTMASTER_VERSION_NAME" ]] || {
            echo "Unexpected version name" >&2
            exit 1
          }
          [[ "$version_code" == "$NIGHTMASTER_VERSION_CODE" ]] || {
            echo "Unexpected version code" >&2
            exit 1
          }

          for activity in \
            ru.aspid.nightmaster.ShellActivity \
            ru.aspid.nightmaster.ModelChatActivity \
            ru.aspid.nightmaster.MainActivity; do
            grep -Fq "$activity" <<<"$manifest" || {
              echo "Required activity is missing: $activity" >&2
              exit 1
            }
          done

          grep -Fq 'android.intent.action.MAIN' <<<"$manifest" || {
            echo "Launcher MAIN intent is missing" >&2
            exit 1
          }

          if grep -Fq "android.permission.INTERNET" <<<"$permissions"; then
            echo "INTERNET permission must not be present" >&2
            exit 1
          fi

          for library in \
            libai-chat.so \
            libggml-base.so \
            libggml-cpu.so \
            libggml.so \
            libllama-common.so \
            libllama.so \
            libomp.so; do
            grep -Fxq "lib/arm64-v8a/$library" <<<"$files" || {
              echo "Missing ARM64 inference library: $library" >&2
              exit 1
            }
          done

          if grep -Eq '^lib/(armeabi-v7a|x86|x86_64)/(libai-chat|libggml|libllama|libomp)' <<<"$files"; then
            echo "Inference engine must not contain non-ARM64 libraries" >&2
            exit 1
          fi

          [[ "$actual_llama_commit" == "$LLAMA_CPP_COMMIT" ]] || {
            echo "Unexpected llama.cpp commit" >&2
            exit 1
          }

          test -f "$generated_schema" || {
            echo "Room schema v1 is missing from artifact" >&2
            exit 1
          }
          test -f "$committed_schema" || {
            echo "Committed Room schema v1 is missing" >&2
            exit 1
          }
          cmp --silent "$committed_schema" "$generated_schema" || {
            echo "Committed Room schema differs from generated schema" >&2
            diff -u "$committed_schema" "$generated_schema" || true
            exit 1
          }

      - name: Upload APK validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-apk-validation-log
          path: apk-validation.log
          if-no-files-found: warn

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-model-manager-apk
          path: dist/
          if-no-files-found: error
