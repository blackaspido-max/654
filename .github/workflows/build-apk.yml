name: Build Night Master APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout prototype
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses and install native tools
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager \
            "platforms;android-36" \
            "build-tools;36.0.0" \
            "ndk;29.0.13113456" \
            "cmake;3.31.6"

      - name: Prepare project from official llama.cpp
        run: bash scripts/prepare_project.sh

      - name: Build debug APK
        id: gradle_build
        working-directory: build/NightMaster
        shell: bash
        run: |
          set +e
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee ../../gradle-build.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit "$code"

      - name: Upload Gradle log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-gradle-log
          path: gradle-build.log
          if-no-files-found: error

      - name: Collect APK
        run: |
          mkdir -p dist
          cp build/NightMaster/app/build/outputs/apk/debug/app-debug.apk \
             dist/NightMaster-prototype-debug.apk
          sha256sum dist/NightMaster-prototype-debug.apk > dist/SHA256.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NightMaster-prototype-apk
          path: dist/
          if-no-files-found: error
